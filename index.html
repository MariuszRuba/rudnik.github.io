<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Na sprzedaż malownicze działki rekreacyjne przy lesie">
<title>Na sprzedaż | Malownicze Działki</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:Inter,sans-serif; background:#000; color:#222; }
.overlay { background:rgba(0,0,0,0.6); min-height:100vh; padding:30px; }

.container { max-width:1000px; margin:auto; background:#fff; border-radius:12px; overflow:hidden; }

section { padding:30px; border-bottom:1px solid #eee; }

h2 { margin-bottom:20px; }

.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:10px;
}

.gallery img {
  width:100%;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

.gallery img:hover { transform:scale(1.03); }

/* LIGHTBOX */
.lightbox {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.lightbox.active { display:flex; }

.lightbox img {
  max-width:90%;
  max-height:85vh;
  border-radius:10px;
}

.close {
  position:absolute;
  top:20px;
  right:30px;
  font-size:40px;
  color:white;
  cursor:pointer;
}

.nav {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:50px;
  color:white;
  cursor:pointer;
  user-select:none;
}

.prev { left:30px; }
.next { right:30px; }

.counter {
  position:absolute;
  bottom:20px;
  color:white;
  font-size:14px;
}
</style>
</head>

<body>

<div class="overlay">

<div class="container">

<section>
<h2>Galeria</h2>

<div class="gallery" id="gallery">
  <img src="zdjecie1.jpg" alt="">
  <img src="zdjecie2.jpg" alt="">
  <img src="zdjecie3.jpg" alt="">
  <img src="zdjecie4.jpg" alt="">
  <img src="zdjecie5.jpg" alt="">
  <img src="zdjecie6.jpg" alt="">
  <img src="zdjecie7.jpg" alt="">
  <img src="zdjecie8.jpg" alt="">
  <img src="zdjecie9.jpg" alt="">
  <img src="zdjecie10.jpg" alt="">
  <img src="zdjecie11.jpg" alt="">
  <img src="zdjecie12.jpg" alt="">
  <img src="zdjecie13.jpg" alt="">
  <img src="zdjecie14.jpg" alt="">
  <img src="zdjecie15.jpg" alt="">
</div>

</section>

</div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span class="close" id="close">&times;</span>
  <span class="nav prev" id="prev">&#10094;</span>
  <img id="lightbox-img">
  <span class="nav next" id="next">&#10095;</span>
  <div class="counter" id="counter"></div>
</div>

<script>
const images = document.querySelectorAll('#gallery img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const closeBtn = document.getElementById('close');
const nextBtn = document.getElementById('next');
const prevBtn = document.getElementById('prev');
const counter = document.getElementById('counter');

let index = 0;

function showImage(i){
  index = i;
  lightboxImg.src = images[i].src;
  counter.textContent = (i+1) + " / " + images.length;
  lightbox.classList.add('active');
}

images.forEach((img,i)=>{
  img.addEventListener('click',()=>showImage(i));
});

closeBtn.onclick = ()=> lightbox.classList.remove('active');

nextBtn.onclick = ()=> {
  index = (index+1)%images.length;
  showImage(index);
};

prevBtn.onclick = ()=> {
  index = (index-1+images.length)%images.length;
  showImage(index);
};

lightbox.onclick = (e)=>{
  if(e.target === lightbox) lightbox.classList.remove('active');
};

document.addEventListener('keydown', (e)=>{
  if(!lightbox.classList.contains('active')) return;

  if(e.key === "Escape") lightbox.classList.remove('active');
  if(e.key === "ArrowRight") nextBtn.click();
  if(e.key === "ArrowLeft") prevBtn.click();
});
</script>

</body>
</html>
