<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprzedaż nieruchomości</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: url('zamek.jpg') no-repeat center center fixed;
  background-size: cover;
}

/* ciemna nakładka żeby tekst był czytelny */
.overlay {
  background: rgba(0,0,0,0.6);
  min-height: 100vh;
  padding: 20px;
}

header {
  color: white;
  padding: 20px;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: auto;
  background: rgba(255,255,255,0.95);
  padding: 20px;
  border-radius: 12px;
}

/* MINIATURY ZDJĘĆ */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px;
}

.gallery img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.gallery img:hover {
  transform: scale(1.03);
}

/* LIGHTBOX */
#lightbox {
  position: fixed;
  display: none;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

#lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

.button {
  display:inline-block;
  padding:15px;
  background:#27ae60;
  color:white;
  text-decoration:none;
  border-radius:8px;
  font-size:18px;
  margin-right:10px;
}
</style>
</head>

<body>

<div class="overlay">

<header>
<h1>Malownicze Działki
<p>Rudnik / okolice Osiecka</p>
<p style="font-size:22px; font-weight:bold; margin-top:10px;">

<p>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeImg()">
  <img id="lightbox-img">
</div>

<script>
function openImg(src) {
  document.getElementById('lightbox').style.display = 'flex';
  document.getElementById('lightbox-img').src = src;
}

function closeImg() {
  document.getElementById('lightbox').style.display = 'none';
}
</script>

</body>
</html>
